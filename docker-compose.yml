services:

  # ── PHP-FPM (Laravel backend) ─────────────────────────────
  app:
    build: 
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    container_name: spa_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - spa_network
    depends_on:
      db:
        condition: service_healthy

  # ── Nginx (Serwer WWW dla projektu) ──────────────────────
  webserver:
    image: nginx:1.27-alpine
    container_name: spa_nginx
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - spa_network
    depends_on:
      - app

  # ── MySQL 8 (Baza danych) ─────────────────────────────────
  db:
    image: mysql:8.0
    container_name: spa_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: spa_inertia
      MYSQL_USER: danielciupek
      MYSQL_PASSWORD: danielciupek
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - spa_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-udanielciupek", "-pdanielciupek"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Vite (Frontend Dev Server z Hot Reload) ───────────────
  vite:
    image: node:22-alpine
    container_name: spa_vite
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    ports:
      - "5173:5173"
    networks:
      - spa_network
    # npm install uruchamia się tylko, jeśli nie ma node_modules, co przyspiesza start
    command: sh -c "if [ ! -d 'node_modules' ]; then npm install; fi && npm run dev -- --host"

  # ── phpMyAdmin (Baza danych w przeglądarce) ────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: spa_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 300M
    networks:
      - spa_network
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
    driver: local

networks:
  spa_network:
    driver: bridge